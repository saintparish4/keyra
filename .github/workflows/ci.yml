name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Run manually from Actions tab without a new push

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache SBT dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.sbt
          ~/.ivy2/cache
          project/target
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/*.sbt', '**/project/build.properties') }}
        restore-keys: |
          ${{ runner.os }}-sbt-
          
    - name: Start LocalStack
      run: |
        docker-compose up -d localstack
        echo "Waiting for LocalStack to be ready..."
        timeout 120 bash -c 'until curl -s http://localhost:4566/_localstack/health | grep -q "dynamodb.*running"; do sleep 2; done'
        
    - name: Check formatting
      run: sbt scalafmtCheckAll

    - name: Compile
      run: sbt compile

    - name: Run unit tests
      run: sbt test
      
    - name: Run integration tests
      run: sbt "testOnly *IntegrationSpec"
      env:
        USE_LOCALSTACK: "true"
        DYNAMODB_ENDPOINT: "http://localhost:4566"
        KINESIS_ENDPOINT: "http://localhost:4566"
        AWS_ACCESS_KEY_ID: "test"
        AWS_SECRET_ACCESS_KEY: "test"
        AWS_REGION: "us-east-1"
        
    - name: Build Docker image
      run: sbt docker:publishLocal
      
    - name: Cleanup
      if: always()
      run: docker-compose down -v

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache SBT dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.sbt
          ~/.ivy2/cache
          project/target
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/*.sbt', '**/project/build.properties') }}
        restore-keys: |
          ${{ runner.os }}-sbt-

    - name: Build Docker image
      run: sbt docker:publishLocal

    - name: Start full stack
      run: docker-compose up -d
      env:
        AWS_ACCESS_KEY_ID: "test"
        AWS_SECRET_ACCESS_KEY: "test"
        AWS_REGION: "us-east-1"

    - name: Wait for /health (retry 3)
      run: |
        for i in 1 2 3; do
          echo "Health check attempt $i..."
          curl -sf http://localhost:8080/health && break
          [ "$i" -eq 3 ] && echo "Service did not become healthy" && exit 1
          sleep 10
        done

    - name: Smoke — POST /v1/ratelimit/check
      run: |
        curl -sf -X POST http://localhost:8080/v1/ratelimit/check \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer test-api-key" \
          -d '{"key": "smoke-test", "cost": 1}' | tee /dev/stderr | grep -q '"allowed"'

    - name: Smoke — POST /v1/idempotency/check
      run: |
        curl -sf -X POST http://localhost:8080/v1/idempotency/check \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer test-api-key" \
          -d '{"idempotencyKey": "smoke-idem-1", "ttl": 3600}' | tee /dev/stderr | grep -q '"status"'

    - name: Cleanup
      if: always()
      run: docker-compose down -v
